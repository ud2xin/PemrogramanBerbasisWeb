<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Nilai Mahasiswa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #output {
            margin-top: 20px;
            font-weight: bold;
            color: #333;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Cek Nilai Mahasiswa</h2>
        <form id="nilaiForm">
            <label for="nim">NIM:</label>
            <input type="text" id="nim" name="nim" required placeholder="Masukkan NIM">

            <label for="nilai">Nilai Mata Kuliah:</label>
            <input type="number" id="nilai" name="nilai" required placeholder="Masukkan Nilai (0-100)" min="0" max="100">

            <button type="button" onclick="cekNilai()">Cek Nilai</button>

            <div id="output"></div>
        </form>
    </div>

    <script>
        function cekNilai() {
            const nilai = document.getElementById("nilai").value;
            const output = document.getElementById("output");

            let hurufMutu = "";

            if (nilai >= 80 && nilai <= 100) {
                hurufMutu = "A";
            } else if (nilai >= 70 && nilai <= 79) {
                hurufMutu = "B";
            } else if (nilai >= 60 && nilai <= 69) {
                hurufMutu = "C";
            } else if (nilai >= 50 && nilai <= 59) {
                hurufMutu = "D";
            } else if (nilai >= 0 && nilai <= 49) {
                hurufMutu = "E";
            } else {
                output.innerHTML = "<p class='error'>Nilai tidak valid!</p>";
                return;
            }

            output.innerHTML = `<p>Huruf Mutu: <strong>${hurufMutu}</strong></p>`;
        }
    </script>

</body>
</html>
